services:
  backend:
    build:
      context: ../..
      dockerfile: stack/local/Dockerfile
    container_name: secret-santa-backend
    env_file: .env
    environment:
      PORT: 3002
      DB_PATH: /data/secret-santa.db
      NODE_ENV: development
    volumes:
      - ../../:/opt
      - /opt/node_modules
      - ../../data:/data
    ports:
      - '3002:3002'
    command: npm run start:dev

  proxy:
    image: nginx:alpine
    container_name: ricettario-proxy
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    #  - frontend

volumes:
  db-data:

